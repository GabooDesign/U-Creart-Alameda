<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Proyecto U-Creart Alameda LABCD</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>
</head>

<body>

<a-scene>

    <a-assets>
        <video
            id="video360"
            src="multimedia/001.mp4"
            autoplay
            loop
            playsinline
            webkit-playsinline
            crossorigin="anonymous">
        </video>
    </a-assets>

    <a-videosphere src="#video360"></a-videosphere>

</a-scene>

<script>
const video = document.querySelector('#video360');

document.querySelector('a-scene').addEventListener('loaded', () => {
    video.play().catch(console.error);
});
</script>

</body>
</html>
