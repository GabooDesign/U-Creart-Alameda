<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Proyecto U-Creart Alameda LABCD</title>
    <script src="https://aframe.io/releases/1.8.0/aframe.min.js"></script>

    <style>
        #overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:black;
            display:flex;
            justify-content:center;
            align-items:center;
            z-index:9999;
        }

        #startButton{
            font-size:1.5rem;
            padding:20px 40px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div id="overlay">
    <button id="startButton">Entrar a la experiencia</button>
</div>

<a-scene>

    <a-assets>
        <video
            id="video360"
            src="multimedia/001.mp4"
            preload="auto"
            loop
            playsinline
            webkit-playsinline
            crossorigin="anonymous">
        </video>
    </a-assets>

    <a-videosphere src="#video360"></a-videosphere>

</a-scene>

<script>

const video = document.getElementById("video360");
const overlay = document.getElementById("overlay");
const button = document.getElementById("startButton");

button.addEventListener("click", async () => {

    try{
        await video.play();
        overlay.style.display = "none";
    }
    catch(err){
        console.error(err);
    }

});

</script>

</body>
</html>
