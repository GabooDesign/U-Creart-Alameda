<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tour 360 Metro</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <!-- Assets -->
  <a-assets>
    <img id="escena1" src="sky.png">
    <img id="escenaPuertas" src="Escena1.png">
    <img id="escenaMapa" src="Escena2.png">
  </a-assets>

  <!-- Fondo -->
  <a-sky id="sky" src="#escena1" material="" geometry="" rotation="0 -90 0"></a-sky>

  <!-- HOTSPOTS -->

  <a-entity class="clickable" 
  geometry="primitive: circle; 
  radius: 0.3" 
  material="color: red; shader: flat" 
  position="1 0 -2" 
  onclick="changeScene('#escenaPuertas')" 
  visible="">
  </a-entity>

  <a-entity class="clickable" 
  geometry="primitive: circle; radius: 0.3" 
  material="color: blue; 
  shader: flat" 
  position="-1 0 -2" 
  onclick="changeScene('#escenaMapa')" 
  visible="">
  </a-entity>

  <!-- BOTÓN VOLVER -->
  <a-entity id="btnBack" 
  visible="false" 
  class="clickable" 
  geometry="primitive: plane; height: 0.4" 
  material="color: black; 
  opacity: 0.7" 
  position="0 -0.300 -1.5" 
  onclick="goBack()">
  
  <a-text value="Volver" align="center" color="white" text=""></a-text>
  </a-entity>

  <!-- CÁMARA -->
  <a-entity camera look-controls>

    <a-entity 
      id="cursor"
      position="0 0 -1"
      geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.015"
      material="color: white; shader: flat"
      cursor="fuse: true; fuseTimeout: 1200"
      raycaster="objects: .clickable; far: 10">

      <a-entity
        id="progress"
        geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.025; thetaLength: 0"
        material="color: cyan; shader: flat">
      </a-entity>

    </a-entity>

    <a-entity 
      id="fade"
      geometry="primitive: sphere; radius: 0.5"
      material="color: black; opacity: 0; side: back"
      position="0 0 0">
    </a-entity>

  </a-entity>

</a-scene>

<script>

let currentScene = "#escena1";

function fadeIn(callback) {
  const fade = document.querySelector('#fade');
  fade.setAttribute('animation', {
    property: 'material.opacity',
    to: 1,
    dur: 400,
    easing: 'easeInOutQuad'
  });

  setTimeout(callback, 400);
}

function fadeOut() {
  const fade = document.querySelector('#fade');
  fade.setAttribute('animation', {
    property: 'material.opacity',
    to: 0,
    dur: 400,
    easing: 'easeInOutQuad'
  });
}

function changeScene(sceneId) {
  fadeIn(() => {

    const sky = document.querySelector('#sky');
    sky.setAttribute('src', sceneId);

    document.querySelectorAll('.clickable').forEach(el => {
      if (el.id !== "btnBack") {
        el.setAttribute('visible', false);
      }
    });

    document.querySelector('#btnBack').setAttribute('visible', true);

    currentScene = sceneId;

    fadeOut();
  });
}

function goBack() {
  fadeIn(() => {

    const sky = document.querySelector('#sky');
    sky.setAttribute('src', '#escena1');

    document.querySelectorAll('.clickable').forEach(el => {
      if (el.id !== "btnBack") {
        el.setAttribute('visible', true);
      }
    });

    document.querySelector('#btnBack').setAttribute('visible', false);

    currentScene = "#escena1";

    fadeOut();
  });
}


const cursor = document.querySelector('#cursor');
const progress = document.querySelector('#progress');

let fuseTimeout = 1200;
let startTime = null;
let hovering = false;

cursor.addEventListener('mouseenter', () => {
  hovering = true;
  startTime = Date.now();
  animateProgress();
  cursor.setAttribute('material', 'color', 'cyan');
});

cursor.addEventListener('mouseleave', () => {
  hovering = false;
  progress.setAttribute('geometry', 'thetaLength', 0);
  cursor.setAttribute('material', 'color', 'white');
});

function animateProgress() {
  if (!hovering) return;

  const elapsed = Date.now() - startTime;
  const percent = Math.min(elapsed / fuseTimeout, 1);

  progress.setAttribute('geometry', 'thetaLength', percent * 360);

  if (percent < 1) {
    requestAnimationFrame(animateProgress);
  }
}

</script>

</body>
</html>
